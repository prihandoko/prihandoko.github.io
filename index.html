<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Not a Note</title>
  <script src="layout.js"></script>
  <style>
    :root { --max-w: 620px; }

    main { max-width: var(--max-w); margin: 0 auto; padding: 2rem 1.5rem 6rem; }

    .feed-intro { padding: 2.5rem 0 1.5rem; border-bottom: 1px solid var(--border); }
    .feed-intro h1 { font-family: 'Source Serif 4', serif; font-size: 1.6rem; font-weight: 400; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .feed-intro p { font-size: 0.9rem; color: var(--muted); line-height: 1.6; }

    /* TAG FILTER */
    .tag-filter { display: flex; flex-wrap: wrap; gap: 0.4rem; padding: 1rem 0 0; }
    .tag-pill {
      font-size: 0.72rem; background: var(--tag-bg); color: var(--muted);
      padding: 0.25rem 0.7rem; border-radius: 20px; cursor: pointer;
      border: 1px solid transparent; transition: all 0.15s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .tag-pill:hover { border-color: var(--border); color: var(--ink); }
    .tag-pill.active { background: var(--tag-active-bg); color: var(--tag-active-fg); }

    /* FEED */
    .feed-meta { font-size: 0.75rem; color: var(--muted); padding: 0.75rem 0; }
    .post-card {
      display: flex; gap: 1rem; padding: 1.25rem 0;
      border-bottom: 1px solid var(--border); cursor: pointer;
      text-decoration: none; color: inherit; transition: background 0.15s;
    }
    .post-card:hover { background: var(--hover); margin: 0 -1.5rem; padding-left: 1.5rem; padding-right: 1.5rem; }

    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--avatar-bg); color: var(--avatar-fg);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 500; font-family: 'Source Serif 4', serif;
      margin-top: 2px; transition: background 0.25s, color 0.25s;
    }
    .post-body { flex: 1; min-width: 0; }
    .post-meta { display: flex; align-items: baseline; gap: 0.5rem; margin-bottom: 0.35rem; }
    .post-author { font-size: 0.88rem; font-weight: 500; }
    .post-date { font-size: 0.78rem; color: var(--muted); }
    .post-title { font-family: 'Source Serif 4', serif; font-size: 1rem; font-weight: 500; line-height: 1.4; margin-bottom: 0.3rem; letter-spacing: -0.01em; }
    .post-excerpt { font-size: 0.85rem; color: var(--muted); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 0.6rem; }
    .post-footer-row { display: flex; align-items: center; gap: 0.75rem; }
    .post-tag { font-size: 0.72rem; background: var(--tag-bg); color: var(--muted); padding: 0.18rem 0.55rem; border-radius: 20px; letter-spacing: 0.02em; }
    .post-read { font-size: 0.75rem; color: var(--muted); }
    .post-thumb { width: 72px; height: 72px; border-radius: 8px; background: var(--tag-bg); flex-shrink: 0; align-self: center; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }

    .no-results { padding: 3rem 0; text-align: center; font-size: 0.9rem; color: var(--muted); display: none; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .post-card { animation: fadeUp 0.4s ease both; }
    .post-card:nth-child(1) { animation-delay: 0.05s; }
    .post-card:nth-child(2) { animation-delay: 0.10s; }
    .post-card:nth-child(3) { animation-delay: 0.15s; }
    .post-card:nth-child(4) { animation-delay: 0.20s; }
    .post-card:nth-child(5) { animation-delay: 0.25s; }
  </style>
</head>
<body>

<main>
  <div class="feed-intro">
    <h1>Thoughts &amp; writing</h1>
    <p>Essays, ideas, and notes on things I find interesting.</p>
    <div class="tag-filter" id="tagFilter"></div>
  </div>

  <div class="feed-meta" id="feedMeta"></div>
  <div id="feed"></div>
  <div class="no-results" id="noResults">No posts match your search.</div>
</main>

<script>
  const AUTHOR_INITIAL = "R";
  const AUTHOR_NAME    = "Rudi Prihandoko";

  let allPosts  = [];
  let activeTag = null;

  const urlTag = new URLSearchParams(window.location.search).get('tag');
  if (urlTag) activeTag = urlTag;

  function calcReadTime(html) {
    const words = html.replace(/<[^>]+>/g, ' ').trim().split(/\s+/).length;
    return Math.max(1, Math.round(words / 238));
  }

  function renderFeed() {
    const filtered = allPosts.filter(p =>
      !activeTag || (p.tags || []).includes(activeTag)
    );

    document.getElementById('feedMeta').textContent =
      filtered.length === allPosts.length
        ? `${allPosts.length} post${allPosts.length !== 1 ? 's' : ''}`
        : `${filtered.length} of ${allPosts.length} posts`;

    document.getElementById('noResults').style.display = filtered.length === 0 ? 'block' : 'none';

    document.getElementById('feed').innerHTML = filtered.map(p => `
      <a class="post-card" href="post.html?id=${p.id}">
        <div class="avatar">${AUTHOR_INITIAL}</div>
        <div class="post-body">
          <div class="post-meta">
            <span class="post-author">${AUTHOR_NAME}</span>
            <span class="post-date">· ${p.date}</span>
          </div>
          <div class="post-title">${p.title}</div>
          <div class="post-excerpt">${p.excerpt}</div>
          <div class="post-footer-row">
            ${(p.tags||[]).map(t => `<span class="post-tag">${t}</span>`).join('')}
            <span class="post-read" id="rt-${p.id}">— min read</span>
          </div>
        </div>
        <div class="post-thumb">${p.emoji}</div>
      </a>`).join('');

    filtered.forEach(p => {
      fetch(`posts/${p.id}.json`)
        .then(r => r.ok ? r.json() : null)
        .then(post => {
          if (!post) return;
          const el = document.getElementById(`rt-${p.id}`);
          if (el) el.textContent = `${calcReadTime(post.content || '')} min read`;
        })
        .catch(() => {});
    });
  }

  function renderTagFilter(posts) {
    const tagCounts = {};
    posts.forEach(p => (p.tags || []).forEach(t => tagCounts[t] = (tagCounts[t] || 0) + 1));
    const tags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);
    const container = document.getElementById('tagFilter');
    if (!tags.length) return;

    const allPill = document.createElement('button');
    allPill.className = 'tag-pill' + (!activeTag ? ' active' : '');
    allPill.textContent = 'All';
    allPill.onclick = () => { activeTag = null; updatePills(); renderFeed(); };
    container.appendChild(allPill);

    tags.forEach(([tag, count]) => {
      const pill = document.createElement('button');
      pill.className = 'tag-pill' + (activeTag === tag ? ' active' : '');
      pill.textContent = `${tag} ${count}`;
      pill.onclick = () => { activeTag = activeTag === tag ? null : tag; updatePills(); renderFeed(); };
      container.appendChild(pill);
    });
  }

  function updatePills() {
    document.querySelectorAll('.tag-pill').forEach((pill, i) => {
      if (i === 0) pill.classList.toggle('active', !activeTag);
      else pill.classList.toggle('active', activeTag === pill.textContent.replace(/\s\d+$/, '').trim());
    });
  }

  fetch('posts/index.json')
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(posts => { allPosts = posts; renderTagFilter(posts); renderFeed(); })
    .catch(() => {
      document.getElementById('feed').innerHTML =
        '<p style="color:var(--muted);padding:2rem 0;font-size:0.9rem;">Could not load posts. Run <code>npx serve .</code> from your blog folder.</p>';
    });
</script>
</body>
</html>
